<!DOCTYPE html>
<html lang="ru">
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Mnemonik — тренажёр искусства памяти: числа, карты, лица, дуэли и академия мнемоники.">
  <meta name="theme-color" content="#000000">

  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Mnemonik">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Mnemonik</title>
  <link rel="manifest" href="manifest.json">

  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      min-height: 100%;
      background: #000000;
      overflow: hidden;
      overscroll-behavior: none;
    }

  /* Flutter 3 web host — force full browser viewport on desktop/laptop */
    body > flutter-view,
    body > flt-glass-pane,
    flt-scene-host,
    flt-scene,
    #flutter_container {
      display: block;
      width: 100% !important;
      height: 100% !important;
      max-width: none !important;
      max-height: none !important;
    }

    #loading {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
      margin: 0;
      background: #000000;
      color: #ccff00;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      letter-spacing: 0.04em;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="loading">Загрузка Mnemonik…</div>
  <script>
    (function () {
      var VERSION = '2026-07-09-v6';
      var KEY = 'mnemonik_web_version';
      var RELOAD_FLAG = 'mnemonik_reload_once_v6';

      function hideLoading() {
        var el = document.getElementById('loading');
        if (el) el.remove();
      }

      window.addEventListener('flutter-first-frame', hideLoading);
      document.addEventListener('flutter-first-frame', hideLoading);

      function ensureFullViewport() {
        var nodes = document.querySelectorAll(
          'flutter-view, flt-glass-pane, flt-scene-host, flt-scene, #flutter_container'
        );
        for (var i = 0; i < nodes.length; i++) {
          nodes[i].style.width = '100%';
          nodes[i].style.height = '100%';
          nodes[i].style.maxWidth = 'none';
        }
      }

      function bootFlutter() {
        ensureFullViewport();
        var s = document.createElement('script');
        s.src = 'flutter_bootstrap.js';
        s.async = true;
        s.onload = function () {
          setTimeout(hideLoading, 12000);
        };
        document.body.appendChild(s);
        window.addEventListener('resize', ensureFullViewport);
        setTimeout(ensureFullViewport, 0);
        setTimeout(ensureFullViewport, 500);
      }

      if (localStorage.getItem(KEY) === VERSION) {
        bootFlutter();
        return;
      }

      if (!sessionStorage.getItem(RELOAD_FLAG)) {
        sessionStorage.setItem(RELOAD_FLAG, '1');
        localStorage.setItem(KEY, VERSION);
        var tasks = [];
        if ('serviceWorker' in navigator) {
          tasks.push(
            navigator.serviceWorker.getRegistrations().then(function (regs) {
              return Promise.all(regs.map(function (r) { return r.unregister(); }));
            })
          );
        }
        if (window.caches && caches.keys) {
          tasks.push(
            caches.keys().then(function (keys) {
              return Promise.all(keys.map(function (k) { return caches.delete(k); }));
            })
          );
        }
        Promise.all(tasks).finally(function () { location.reload(); });
        return;
      }

      sessionStorage.removeItem(RELOAD_FLAG);
      localStorage.setItem(KEY, VERSION);
      bootFlutter();
    })();
  </script>
</body>
</html>
