<!DOCTYPE html>
<html lang="ru">
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Mnemonik — тренажёр искусства памяти: числа, карты, лица, дуэли и академия мнемоники.">
  <meta name="theme-color" content="#000000">

  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Mnemonik">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Mnemonik</title>
  <link rel="manifest" href="manifest.json">

  <style>
    html, body {
      margin: 0;
      height: 100%;
      background: #000000;
      overflow: hidden;
      overscroll-behavior: none;
    }

    #loading {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      color: #ccff00;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      letter-spacing: 0.04em;
    }
  </style>
</head>
<body>
  <div id="loading">Загрузка Mnemonik…</div>
  <script>
    (function () {
      var VERSION = '2026-06-13-v3';
      var KEY = 'mnemonik_web_version';
      var RELOAD_FLAG = 'mnemonik_reload_once_v3';

      function bootFlutter() {
        var s = document.createElement('script');
        s.src = 'flutter_bootstrap.js';
        s.async = true;
        document.body.appendChild(s);
      }

      if (localStorage.getItem(KEY) === VERSION) {
        bootFlutter();
        return;
      }

      if (!sessionStorage.getItem(RELOAD_FLAG)) {
        sessionStorage.setItem(RELOAD_FLAG, '1');
        localStorage.setItem(KEY, VERSION);
        var tasks = [];
        if ('serviceWorker' in navigator) {
          tasks.push(
            navigator.serviceWorker.getRegistrations().then(function (regs) {
              return Promise.all(regs.map(function (r) { return r.unregister(); }));
            })
          );
        }
        if (window.caches && caches.keys) {
          tasks.push(
            caches.keys().then(function (keys) {
              return Promise.all(keys.map(function (k) { return caches.delete(k); }));
            })
          );
        }
        Promise.all(tasks).finally(function () { location.reload(); });
        return;
      }

      sessionStorage.removeItem(RELOAD_FLAG);
      localStorage.setItem(KEY, VERSION);
      bootFlutter();
    })();
  </script>
</body>
</html>
