<!DOCTYPE html>
<html lang="ru">
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Mnemonik — тренажёр искусства памяти: числа, карты, лица, дуэли и академия мнемоники.">
  <meta name="theme-color" content="#000000">

  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Mnemonik">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Mnemonik</title>
  <link rel="manifest" href="manifest.json">

  <style>
    html, body {
      margin: 0;
      height: 100%;
      background: #000000;
      overflow: hidden;
      overscroll-behavior: none;
    }

    #loading {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      color: #ccff00;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      letter-spacing: 0.04em;
    }

    @media (min-width: 768px) {
      body {
        background: radial-gradient(ellipse at center, #111111 0%, #000000 72%);
      }
    }
  </style>
</head>
<body>
  <div id="loading">Загрузка Mnemonik…</div>
  <script>
    // Сброс устаревшего PWA-кэша после обновления деплоя.
    (function () {
      var VERSION = '2026-06-13-v2';
      try {
        if (localStorage.getItem('mnemonik_web_version') === VERSION) return;
        localStorage.setItem('mnemonik_web_version', VERSION);
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.getRegistrations().then(function (regs) {
            regs.forEach(function (r) { r.unregister(); });
          });
        }
        if (window.caches && caches.keys) {
          caches.keys().then(function (keys) {
            keys.forEach(function (k) { caches.delete(k); });
          });
        }
      } catch (e) {}
    })();
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
